
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💼</text></svg>">
    <title>Careers | GreenLine Consulting</title>
    <link rel="icon" href="https://img.icons8.com/color/48/manager.png" type="image/x-icon">
    <style>
        :root {
            --brand-gold: #c5a059;
            --brand-charcoal: #2b2b2b;
            --off-white: #fcfaf7;
            --text-gray: #555;
        }

        body {
            font-family: 'Garamond', serif; /* Elegant consulting vibe */
            margin: 0;
            background-color: var(--off-white);
            color: var(--brand-charcoal);
        }

        header {
            padding: 2rem 10%;
            background: white;
            border-bottom: 3px solid var(--brand-gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-size: 1.5rem; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }

        .hero {
            padding: 5rem 10%;
            text-align: center;
            background: var(--brand-charcoal);
            color: white;
        }

        .hero h1 { font-size: 3rem; margin-bottom: 1rem; font-weight: 300; }

        .job-container { max-width: 900px; margin: 4rem auto; padding: 0 1rem; }

        .job-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 0;
            border-bottom: 1px solid #ddd;
        }

        .job-title { font-size: 1.4rem; color: var(--brand-charcoal); font-family: 'Helvetica', sans-serif; }
        
        .apply-link {
            color: var(--brand-gold);
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
            border: 1px solid var(--brand-gold);
            padding: 0.5rem 1.5rem;
            transition: all 0.3s;
        }

        .apply-link:hover { background: var(--brand-gold); color: white; }
    </style>
</head>
<body>
    <header>
        <div class="logo">GreenLine <span style="color:var(--brand-gold)">Consulting</span></div>
    </header>

    <section class="hero">
        <h1>Excellence. Strategy. Impact.</h1>
        <p>Join our team of global advisors.</p>
    </section>

    <div class="job-container" id="job-board">
        <p>Loading opportunities...</p>
    </div>

    <script>
        async function fetchJobs() {
            const container = document.getElementById('job-board');
            try {
                // Using the logistics board token provided earlier to simulate the API pull
                const response = await fetch('https://boards-api.greenhouse.io/v1/boards/secondeexternaldemomatt/jobs');
                const data = await response.json();
                container.innerHTML = '';

                data.jobs.forEach(job => {
                    const div = document.createElement('div');
                    div.className = 'job-entry';
                    // We point to our internal job-post.html and pass the ID as a parameter
                    div.innerHTML = `
                        <div>
                            <div class="job-title">${job.title}</div>
                            <div style="color:var(--text-gray)">${job.location.name}</div>
                        </div>
                        <a href="job-post.html?gh_jid=${job.id}" class="apply-link">View Position</a>
                    `;
                    container.appendChild(div);
                });
            } catch (e) {
                container.innerHTML = 'Error loading jobs.';
            }
        }
        fetchJobs();
    </script>
</body>
</html>
